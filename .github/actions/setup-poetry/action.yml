name: "Setup Poetry"
description: "Install Poetry, configure in-project venv, and cache dependencies"
inputs:
  python-version:
    description: "Python version for cache key"
    required: true
  poetry-version:
    description: "Poetry version to install"
    required: true
runs:
  using: "composite"
  steps:
    - name: Install Poetry
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "poetry==${{ inputs.poetry-version }}"
        poetry config virtualenvs.in-project true
    - name: Cache Poetry
      uses: actions/cache@v4
      with:
        path: |
          .venv
          ~/.cache/pypoetry
          ~/.cache/pip
        key: ${{ runner.os }}-poetry-${{ inputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-poetry-${{ inputs.python-version }}-
