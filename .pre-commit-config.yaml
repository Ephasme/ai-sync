repos:
  - repo: local
    hooks:
      - id: lint
        name: Lint
        entry: poetry run ruff check src/
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: typecheck
        name: Typecheck
        entry: poetry run pyright
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: tests
        name: Tests
        entry: poetry run pytest
        language: system
        pass_filenames: false
        stages: [pre-commit]
